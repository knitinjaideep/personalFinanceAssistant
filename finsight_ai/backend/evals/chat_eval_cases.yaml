# ── 8. No-data / ambiguous scenarios (2) ─────────────────────────────────────
# These test that the pipeline produces a helpful fallback, not a crash or
# a confabulated dollar amount.

- id: nodata_001
  question: "How much did I spend at a store that doesn't exist xyz123?"
  tags: [nodata, fallback]
  expected:
    intent: [spending_summary, transaction_search]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    # Pipeline must not invent a number for a nonsense merchant
    answer_must_not_include: ["I assume", "probably", "$0.00"]

- id: nodata_002
  question: "What is my Fidelity balance?"
  tags: [nodata, balance]
  expected:
    intent: balance_summary
    domain: sql
    route_type: simple_sql
    route_risk: safe
    # Fidelity is not a covered institution — must not hallucinate a balance
    answer_must_not_include: ["I assume", "probably", "I don't know for sure"]

