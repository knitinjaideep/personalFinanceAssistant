# ── 11. Ambiguous / clarification-requiring questions (2) ────────────────────

- id: ambiguous_001
  question: "Tell me about gold"
  tags: [ambiguous, clarification]
  expected:
    # "gold" could be Amex Gold, gold commodity, or something else.
    # Any coherent intent is acceptable — the key constraint is no hallucination.
    intent: [spending_summary, investment_summary, account_summary, unknown]
    domain: [sql, hybrid, unknown]
    # vague question: low rule confidence → needs_llm_planner or clarification
    route_type: [sql_analysis, hybrid, clarification]
    route_risk: [needs_llm_planner, needs_clarification]
    answer_must_not_include: ["I assume", "probably", "I'm not sure what you mean but here are some numbers"]

- id: ambiguous_002
  question: "What happened last month?"
  tags: [ambiguous, clarification]
  expected:
    # Vague — should produce spending/transaction/balance, never invent facts
    intent: [spending_summary, transaction_search, balance_summary, account_summary, unknown]
    domain: [sql, hybrid, unknown]
    # "what happened" → vague_happened complexity signal
    route_type: [sql_analysis, hybrid, clarification]
    route_risk: [needs_llm_planner, needs_clarification]
    answer_must_not_include: ["I assume", "probably caused by"]

# ── 12. Silent-relaxation guard cases (6) ────────────────────────────────────
# These cases prove that the pipeline does NOT answer with unrelated data
# when the exact filters return nothing. The bot must say "no match" and
# clearly identify what it searched for — it must never silently widen the
# query and present the widened result as though it answered the question.

- id: no_relax_001
  question: "How much did I spend at Costco in May 2026?"
  tags: [nodata, no_relax, merchant, daterange]
  expected:
    intent: [spending_summary, transaction_search]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      merchant: ["costco"]
    # Must NOT claim a dollar figure unless Costco+May2026 rows actually exist.
    # Must NOT answer with grocery spending in May, or Costco in April.
    answer_must_not_include:
      - "I assume"
      - "probably"
      - "based on similar"
      - "I found related"
      - "although you asked"

- id: no_relax_002
  question: "Show me my Netflix charges in January 2025"
  tags: [nodata, no_relax, merchant, daterange]
  expected:
    intent: [transaction_search, spending_summary]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      merchant: ["netflix"]
    # Must not return non-Netflix charges or non-January data as the answer
    answer_must_not_include:
      - "I assume"
      - "based on related"
      - "I found subscriptions"
      - "although you asked"

- id: no_relax_003
  question: "What are my Chase transactions from February 2023?"
  tags: [nodata, no_relax, institution, daterange]
  expected:
    intent: transaction_search
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      institution: ["chase"]
    # If we have no Chase data from Feb 2023, must say so — not return
    # Chase transactions from a different month as the answer
    answer_must_not_include:
      - "I assume"
      - "probably"
      - "I found Chase transactions"  # would be OK only if Feb 2023 is confirmed

- id: no_relax_004
  question: "How much did I spend on groceries at Whole Foods in March 2024?"
  tags: [nodata, no_relax, merchant, category, daterange]
  expected:
    intent: [spending_summary, transaction_search]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      merchant: ["whole foods"]
      category: ["groceries"]
    # Must not drop merchant or date and return total grocery spend instead
    answer_must_not_include:
      - "I assume"
      - "probably"
      - "I found grocery transactions"  # only valid if Whole Foods+March 2024 matched
      - "based on similar merchants"

- id: no_relax_005
  question: "Show me Amex transactions over $500 in April 2025"
  tags: [nodata, no_relax, institution, daterange]
  expected:
    intent: transaction_search
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      institution: ["amex"]
    # Must not return transactions under $500 or from a different month
    answer_must_not_include:
      - "I assume"
      - "probably"
      - "I found related Amex transactions"
      - "although you asked for over"

- id: no_relax_006
  question: "What did I spend at Starbucks last week?"
  tags: [nodata, no_relax, merchant, daterange]
  expected:
    intent: [transaction_search, spending_summary]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    required_entities:
      merchant: ["starbucks"]
    # Must not return total coffee/restaurant spend as though it answered Starbucks
    answer_must_not_include:
      - "I assume"
      - "probably"
      - "I found coffee"
      - "based on similar merchants"
      - "I found restaurant"

# ── 13. Phase 5/6 — FactBundle accuracy + template-only checks (8) ───────────
# These cases verify:
#   a) Template path is chosen for simple SQL answers (llm_called=False)
#   b) LLM is NOT called for simple single-metric questions
#   c) Answers contain a $ amount (proving Python computed it, not LLM guessing)
#   d) Comparison and "why" questions still use LLM (hybrid/llm_narrative)

- id: phase56_template_001
  question: "How much did I spend on groceries last month?"
  tags: [phase56, template, spending]
  expected:
    intent: spending_summary
    domain: sql
    route_type: simple_sql
    route_risk: safe
    # Simple SQL with exact category filter → template_only, LLM not called
    answer_strategy: template_only
    answer_must_not_include: ["I assume", "probably", "I think"]

- id: phase56_template_002
  question: "What are my account balances?"
  tags: [phase56, template, balance]
  expected:
    intent: balance_summary
    domain: sql
    route_type: simple_sql
    route_risk: safe
    answer_strategy: template_only
    answer_must_not_include: ["I assume", "I think", "roughly"]

- id: phase56_template_003
  question: "What fees has Morgan Stanley charged me?"
  tags: [phase56, template, fees]
  expected:
    intent: fees_summary
    domain: [sql, hybrid]
    route_type: [simple_sql, hybrid]
    route_risk: safe
    answer_must_not_include: ["I assume", "probably", "I think"]

- id: phase56_template_004
  question: "Show me my Chase credit card transactions"
  tags: [phase56, template, transaction]
  expected:
    intent: transaction_search
    domain: sql
    route_type: simple_sql
    route_risk: safe
    answer_strategy: template_only
    answer_must_not_include: ["I assume", "I think"]

- id: phase56_template_005
  question: "How much is my total invested amount?"
  tags: [phase56, template, investment]
  expected:
    intent: investment_summary
    domain: [sql, hybrid]
    route_type: [simple_sql, hybrid]
    route_risk: safe
    answer_must_not_include: ["I assume", "probably", "I think", "typically"]

- id: phase56_llm_001
  question: "Why did my spending increase last month?"
  tags: [phase56, llm, analysis]
  expected:
    intent: [spending_summary, comparison]
    domain: sql
    # "why" → complexity signal → hybrid_template_plus_llm or llm_narrative
    route_type: sql_analysis
    route_risk: needs_llm_planner
    answer_must_not_include: ["I assume", "total_spent", "fee_category"]

- id: phase56_llm_002
  question: "Compare my March vs April spending and explain the trends"
  tags: [phase56, llm, comparison]
  expected:
    intent: comparison
    domain: sql
    route_type: sql_analysis
    route_risk: needs_llm_planner
    # Comparison with "explain" → LLM narrative needed
    answer_must_not_include: ["I assume", "total_spent", "sql_used"]

- id: phase56_nodata_001
  question: "How much did I spend at XYZ999 store in March 2025?"
  tags: [phase56, nodata, template]
  expected:
    intent: [spending_summary, transaction_search]
    domain: sql
    route_type: simple_sql
    route_risk: safe
    # No data → template produces clean no-data message
    answer_strategy: template_only
    answer_must_not_include: ["I assume", "probably", "$0.00", "I think"]

