# ── 7. Follow-up / contextual questions (2) ──────────────────────────────────
# These simulate "what about March?" style follow-ups.
# The runner evaluates them independently (no conversation history),
# so they're treated as standalone questions with embedded time context.

- id: followup_001
  question: "What about my spending in March?"
  tags: [followup, spending]
  expected:
    intent: spending_summary
    domain: sql
    # "what about" triggers complexity signal → needs_llm_planner
    route_type: sql_analysis
    route_risk: needs_llm_planner
    # "March" should be extracted as time context
    answer_must_not_include: ["I assume", "I don't know"]

- id: followup_002
  question: "What about March dining specifically?"
  tags: [followup, spending, category]
  expected:
    intent: spending_summary
    domain: sql
    # "what about" triggers complexity signal → needs_llm_planner
    route_type: sql_analysis
    route_risk: needs_llm_planner
    required_entities:
