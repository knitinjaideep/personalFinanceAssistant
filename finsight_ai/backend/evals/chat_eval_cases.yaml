# Coral Chat Eval Cases — baseline suite
#
# How to run:
#   cd backend
#   python evals/run_chat_evals.py
#   python evals/run_chat_evals.py --filter spending
#   python evals/run_chat_evals.py --id spend_simple_001
#   python evals/run_chat_evals.py --fail-fast
#
# Fields:
#   id                      — unique case identifier
#   question                — the verbatim user question
#   expected.intent         — ChatIntent value(s) the classifier must produce
#   expected.domain         — DataSource value(s): sql | rag | hybrid
#   expected.route_type     — RouteType: simple_sql | sql_analysis | document_search | hybrid | clarification | unsupported
#   expected.route_risk     — RouteRisk: safe | needs_llm_planner | needs_clarification
#   expected.required_entities — entity keys the classifier must extract
#   expected.answer_must_not_include — strings that must NOT appear in the final answer
#   tags                    — category labels for --filter grouping
#
# NOTE: answer_must_include is intentionally omitted for most cases because the
# DB may be empty in CI. Structural checks (intent/domain/entity/route) are the
# reliable baseline signal.

# ── 1. Simple spending questions (3) ──────────────────────────────────────────

- id: spend_simple_001
  question: "How much did I spend last month?"
  tags: [spending, simple]
  expected:
    intent: spending_summary
    domain: sql
    route_type: simple_sql
    route_risk: safe
    plan_task_type: aggregate_transactions
    answer_must_not_include: ["I assume", "probably", "I don't know"]

- id: spend_simple_002
  question: "What was my total spending this year?"
