# Coral Golden Questions — Eval Suite
# Each entry checks: domain, intent, route, key entities, answer constraints.
# Run with: python app/chat/evals/run_chat_evals.py

# ── Banking (25 questions) ────────────────────────────────────────────────────

- id: banking_spend_001
  question: "How much did I spend on Amex Gold last month?"
  expected:
    domain: "sql"
    intent: "spending_summary"
    route: "sql"
    required_entities:
      account: ["gold", "amex"]
    answer_must_include: ["$"]
    answer_must_not_include: ["I assume", "probably", "I don't know"]

- id: banking_spend_002
  question: "How much did I spend on groceries last month?"
  expected:
    domain: "sql"
    intent: "spending_summary"
    required_entities:
      category: ["groceries"]
    answer_must_include: ["$"]

- id: banking_spend_003
  question: "What was my dining spend in May?"
  expected:
    domain: "sql"
    intent: "spending_summary"
    required_entities:
      category: ["restaurants", "dining"]
    answer_must_include: ["$"]

- id: banking_spend_004
  question: "Show me my total spending by category this year"
  expected:
    domain: "sql"
    intent: "spending_summary"
    answer_must_include: ["$"]
    answer_must_not_include: ["I don't have"]

- id: banking_spend_005
  question: "How much did I spend on subscriptions last quarter?"
  expected:
